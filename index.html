<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicadores Prestaciones — Red de Salud Chachapoyas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0d2b5e; --navy2:#163472; --navy3:#1c3d82;
    --green:#2d7d46; --green2:#38a057; --green3:#4cbb6c;
    --accent:#3b9edd; --gold:#e8a020; --red:#c0392b; --red2:#e74c3c;
    --bg:#f0f4f8; --surface:#ffffff; --surface2:#e8eef5;
    --border:#cdd7e3; --text:#1a2a40; --text2:#4a6080; --text3:#7a90a8;
    --font:'Inter',sans-serif; --mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}

  /* HEADER */
  .header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 60%,#1e4a8a 100%);
    padding:0 28px;display:flex;align-items:center;gap:18px;height:72px;
    position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,43,94,.4);
    border-bottom:3px solid var(--green2);}
  .logo-wrap{width:52px;height:52px;background:white;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 2px 8px rgba(0,0,0,.3);overflow:hidden;padding:2px;}
  .logo-wrap img{width:100%;height:100%;object-fit:contain;border-radius:50%;}
  .header-divider{width:2px;height:40px;background:rgba(255,255,255,.25);border-radius:2px;}
  .header-title h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px;line-height:1.2;}
  .header-title p{font-size:11px;color:rgba(255,255,255,.65);font-family:var(--mono);margin-top:2px;letter-spacing:.5px;}
  .period-badge{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
    border-radius:20px;padding:5px 14px;font-size:11px;font-family:var(--mono);color:#fff;letter-spacing:.5px;}

  /* LOADING */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:calc(100vh - 72px);gap:16px;}
  .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--navy3);
    border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-size:14px;color:var(--text2);}

  /* ERROR */
  .error-box{max-width:500px;margin:60px auto;text-align:center;padding:32px;
    background:var(--surface);border-radius:12px;border:1px solid var(--border);}
  .error-box h2{color:var(--red);margin-bottom:8px;}
  .error-box p{color:var(--text2);font-size:13px;}

  /* LAYOUT */
  .container{display:flex;height:calc(100vh - 72px);}
  .sidebar{width:235px;background:var(--surface);border-right:1px solid var(--border);
    overflow-y:auto;flex-shrink:0;box-shadow:2px 0 6px rgba(0,0,0,.06);}
  .sidebar-header{padding:12px 16px;font-size:10px;font-family:var(--mono);color:var(--text3);
    letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border);
    background:var(--surface2);font-weight:500;}
  .microred-btn{width:100%;padding:10px 14px;background:transparent;border:none;
    border-bottom:1px solid var(--surface2);cursor:pointer;text-align:left;
    transition:all .18s;display:flex;align-items:flex-start;gap:10px;}
  .microred-btn:hover{background:#f5f8fc;}
  .microred-btn.active{background:linear-gradient(90deg,#e8f0fb,#f0f6ff);border-left:3px solid var(--navy3);}
  .mr-left{flex:1;min-width:0;}
  .microred-name{font-size:12px;font-weight:600;color:var(--text);letter-spacing:.1px;line-height:1.3;}
  .microred-btn.active .microred-name{color:var(--navy3);}
  .microred-count{font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:2px;}
  .microred-dots{display:flex;gap:3px;margin-top:5px;}
  .micro-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

  /* MAIN */
  .main{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}

  /* TABS */
  .indicator-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .ind-tab{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface);
    color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--font);font-weight:600;
    transition:all .18s;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .ind-tab:hover{border-color:var(--navy3);color:var(--navy3);}
  .ind-tab.active{background:var(--navy3);border-color:var(--navy3);color:#fff;
    box-shadow:0 2px 8px rgba(28,61,130,.25);}

  /* CARDS */
  .summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;
    position:relative;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06);}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:10px 10px 0 0;}
  .card.blue::before{background:var(--navy3);}
  .card.green::before{background:var(--green2);}
  .card.red::before{background:var(--red2);}
  .card.gold::before{background:var(--gold);}
  .card-label{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .card-value{font-size:26px;font-weight:700;line-height:1;margin-bottom:3px;}
  .card.blue .card-value{color:var(--navy3);}
  .card.green .card-value{color:var(--green);}
  .card.red .card-value{color:var(--red);}
  .card.gold .card-value{color:var(--gold);}
  .card-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}

  /* BAR CHART */
  .bar-chart{display:flex;flex-direction:column;gap:5px;}
  .bar-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 6px;
    border-radius:6px;transition:background .15s;}
  .bar-row:hover{background:var(--surface2);}
  .bar-label{font-size:11px;width:155px;flex-shrink:0;color:var(--text2);
    font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:22px;background:var(--surface2);border-radius:5px;overflow:hidden;
    position:relative;border:1px solid var(--border);}
  .bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:7px;
    font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.95);font-weight:600;
    min-width:2px;transition:width .5s ease;}
  .meta-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(0,0,0,.2);}
  .bar-pct{font-size:11px;font-family:var(--mono);font-weight:600;width:45px;text-align:right;flex-shrink:0;}

  /* TABLE */
  .section-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;
    letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{background:var(--navy);color:rgba(255,255,255,.9);font-family:var(--mono);
    font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:10px 12px;
    text-align:left;position:sticky;top:0;}
  tbody tr{border-bottom:1px solid var(--surface2);transition:background .12s;}
  tbody tr:hover{background:#f5f9ff;}
  td{padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--text2);}
  td:first-child{color:var(--text);font-weight:500;font-family:var(--font);font-size:13px;}

  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;
    font-size:10px;font-weight:700;letter-spacing:.5px;font-family:var(--mono);}
  .badge-cumple{background:rgba(45,125,70,.1);color:var(--green);border:1px solid rgba(45,125,70,.3);}
  .badge-nocumple{background:rgba(192,57,43,.1);color:var(--red);border:1px solid rgba(192,57,43,.25);}
  .badge-sinpac{background:rgba(120,144,168,.1);color:var(--text3);border:1px solid rgba(120,144,168,.2);}

  .progress-wrap{display:flex;align-items:center;gap:7px;}
  .progress-bar{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;
    min-width:50px;border:1px solid var(--border);}
  .progress-fill{height:100%;border-radius:3px;}
  .progress-pct{font-family:var(--mono);font-size:11px;min-width:40px;text-align:right;font-weight:600;}

  /* CLICKABLE NUMS */
  .num-link{cursor:pointer;text-decoration:underline;text-underline-offset:3px;
    text-decoration-style:dotted;transition:color .15s;}
  .num-link.green-link{color:var(--green);}
  .num-link.green-link:hover{color:var(--green2);}
  .num-link.red-link{color:var(--red);}
  .num-link.red-link:hover{color:var(--red2);}
  .num-link.gray-link{color:var(--text3);text-decoration:none;cursor:default;}

  .back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);
    border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:7px;
    cursor:pointer;font-size:12px;font-family:var(--font);margin-bottom:16px;transition:all .18s;
    box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .back-btn:hover{border-color:var(--navy3);color:var(--navy3);}
  .view-title{font-size:20px;font-weight:700;margin-bottom:2px;color:var(--navy);letter-spacing:-.3px;}
  .view-sub{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:16px;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
    display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
  .modal-box{background:var(--surface);border-radius:14px;width:100%;max-width:1000px;
    max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;
    align-items:flex-start;gap:12px;flex-shrink:0;}
  .modal-header-info{flex:1;}
  .modal-header h2{font-size:16px;font-weight:700;color:var(--navy);}
  .modal-header p{font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--mono);}
  .modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);
    padding:4px;border-radius:6px;transition:all .15s;flex-shrink:0;}
  .modal-close:hover{background:var(--surface2);color:var(--text);}
  .modal-filters{padding:12px 22px;border-bottom:1px solid var(--border);display:flex;gap:10px;
    align-items:center;flex-shrink:0;flex-wrap:wrap;}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);
    cursor:pointer;font-size:12px;font-family:var(--font);font-weight:600;color:var(--text2);transition:all .18s;}
  .filter-btn:hover{border-color:var(--navy3);color:var(--navy3);}
  .filter-btn.active-cumple{background:rgba(45,125,70,.1);border-color:var(--green2);color:var(--green);}
  .filter-btn.active-nocumple{background:rgba(192,57,43,.1);border-color:var(--red2);color:var(--red);}
  .filter-btn.active-all{background:var(--navy3);border-color:var(--navy3);color:#fff;}
  .modal-search{flex:1;min-width:180px;}
  .modal-search input{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:8px;
    font-size:12px;font-family:var(--font);}
  .modal-search input:focus{outline:none;border-color:var(--navy3);}
  .modal-count{font-size:11px;font-family:var(--mono);color:var(--text3);margin-left:auto;white-space:nowrap;}
  .modal-body{overflow-y:auto;flex:1;padding:0;}
  .modal-table{width:100%;border-collapse:collapse;font-size:12px;}
  .modal-table th{background:var(--navy);color:rgba(255,255,255,.9);padding:9px 12px;
    text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;
    font-family:var(--mono);position:sticky;top:0;}
  .modal-table td{padding:8px 12px;border-bottom:1px solid var(--surface2);vertical-align:top;}
  .modal-table tr:hover td{background:#f5f9ff;}
  .modal-empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;}
  .motivo-cell{font-size:11px;color:var(--text2);max-width:280px;line-height:1.4;}

  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="header" id="mainHeader">
  <div class="logo-wrap">
    <img id="logoImg" src="" alt="Logo Red de Salud Chachapoyas">
  </div>
  <div class="header-divider"></div>
  <div class="header-title">
    <h1>INDICADORES PRESTACIONES<br>RED DE SALUD CHACHAPOYAS</h1>
    <p>ÁREA DE ASEGURAMIENTO RISCH</p>
  </div>
  <div class="period-badge" id="periodBadge">Cargando...</div>
</div>

<div id="appContent">
  <div class="loading" id="loadingDiv">
    <div class="spinner"></div>
    <p>Cargando datos del dashboard...</p>
  </div>
</div>

<!-- MODAL PACIENTES -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-info">
        <h2 id="modalTitle">Detalle de Pacientes</h2>
        <p id="modalSub"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-filters">
      <button class="filter-btn active-all" id="btnAll" onclick="setFilter('all')">Todos</button>
      <button class="filter-btn" id="btnCumple" onclick="setFilter('cumple')">✓ Cumplen</button>
      <button class="filter-btn" id="btnNoCumple" onclick="setFilter('nocumple')">✗ No Cumplen</button>
      <div class="modal-search">
        <input type="text" id="modalSearch" placeholder="Buscar por nombre o DNI..." oninput="renderModalTable()">
      </div>
      <span class="modal-count" id="modalCount"></span>
    </div>
    <div class="modal-body">
      <table class="modal-table">
        <thead id="modalHead"></thead>
        <tbody id="modalBody"></tbody>
      </table>
    </div>
  </div>
</div>

// ── ESTADO ──
let INDICADORES = [], selectedMR = null, activeInd = null, modalPacientes = [], modalFilter = 'all';

// ── CARGAR datos.json ──
async function init() {
  try {
    document.getElementById('logoImg').src = 'data:image/webp;base64,' + LOGO_B64;
    const res = await fetch('datos.json?v=' + Date.now());
    if (!res.ok) throw new Error('No se encontró datos.json');
    const json = await res.json();
    INDICADORES = json.indicadores || [];
    document.getElementById('periodBadge').textContent = json.periodo || '';
    if (!INDICADORES.length) throw new Error('Sin indicadores en datos.json');
    activeInd = INDICADORES[0];
    buildApp();
  } catch(err) {
    document.getElementById('appContent').innerHTML = `
      <div class="error-box">
        <h2>⚠️ Sin datos</h2>
        <p style="margin-top:8px;">${err.message}</p>
        <p style="margin-top:12px;font-size:12px;color:var(--text3);">
          Usa el <strong>admin.html</strong> para generar el <strong>datos.json</strong> y súbelo a GitHub.
        </p>
      </div>`;
  }
}

function buildApp() {
  document.getElementById('appContent').innerHTML = `
    <div class="container">
      <div class="sidebar" id="sidebar"></div>
      <div class="main" id="main"></div>
    </div>`;
  renderSidebar(); renderMain();
}

// ── HELPERS ──
const pct = v => (v*100).toFixed(1)+'%';
const clrAv = (av,meta) => av>=meta?'#2d7d46':av>meta*.7?'#d97706':'#c0392b';
function getMRs(){ const s=new Set(); INDICADORES[0].datos.forEach(d=>s.add(d.mr)); return [...s].sort(); }
function getMRStats(mr,ind){
  const d=ind.datos.filter(x=>x.mr===mr);
  const act=d.filter(x=>x.den>0);
  const num=act.reduce((s,x)=>s+x.num,0),den=act.reduce((s,x)=>s+x.den,0),av=den>0?num/den:0;
  return{num,den,av,
    cumple:d.filter(x=>x.estado==='SI CUMPLE').length,
    noCumple:d.filter(x=>x.estado==='NO CUMPLE').length,
    sinPac:d.filter(x=>x.estado==='SIN PACIENTES').length,total:d.length};
}
function getMRDotColor(mr,ind){
  const s=getMRStats(mr,ind);
  return s.den===0?'#9ca3af':s.av>=ind.meta?'#2d7d46':'#c0392b';
}

const microredes = () => getMRs();

// ── SIDEBAR ──
function renderSidebar(){
  const sb=document.getElementById('sidebar');
  const mrs=getMRs();
  sb.innerHTML=`<div class="sidebar-header">📍 Microredes (${mrs.length})</div>`;
  mrs.forEach(mr=>{
    const btn=document.createElement('button');
    btn.className='microred-btn'+(selectedMR===mr?' active':'');
    btn.onclick=()=>{selectedMR=mr;renderSidebar();renderMain();};
    const dots=INDICADORES.map(ind=>`<div class="micro-dot" style="background:${getMRDotColor(mr,ind)}" title="${ind.nombre}"></div>`).join('');
    const ct=INDICADORES[0].datos.filter(d=>d.mr===mr).length;
    btn.innerHTML=`<div class="mr-left">
      <div class="microred-name">${mr}</div>
      <div class="microred-count">${ct} IPRESS</div>
      <div class="microred-dots">${dots}</div>
    </div>${selectedMR===mr?'<span style="color:var(--navy3);font-size:14px">›</span>':''}`;
    sb.appendChild(btn);
  });
}

// ── TABS ──
function tabsHTML(){
  return `<div class="indicator-tabs">${INDICADORES.map(ind=>
    `<button class="ind-tab ${activeInd.id===ind.id?'active':''}"
      onclick="activeInd=INDICADORES.find(i=>i.id==='${ind.id}');renderMain();">${ind.nombre}</button>`
  ).join('')}</div>`;
}

// ── CARDS ──
function cardsHTML(cumple,nc,sp,av,num,den,metaLabel){
  return `<div class="summary-cards">
    <div class="card blue"><div class="card-label">Avance</div><div class="card-value">${pct(av)}</div><div class="card-sub">${num}/${den} · ${metaLabel}</div></div>
    <div class="card green"><div class="card-label">✓ Cumplen</div><div class="card-value">${cumple}</div><div class="card-sub">establecimientos</div></div>
    <div class="card red"><div class="card-label">✗ No Cumplen</div><div class="card-value">${nc}</div><div class="card-sub">establecimientos</div></div>
    <div class="card gold"><div class="card-label">— Sin Pacientes</div><div class="card-value">${sp}</div><div class="card-sub">establecimientos</div></div>
  </div>`;
}

// ── OVERVIEW ──
function renderOverview(main){
  const d=activeInd.datos.filter(x=>x.den>0);
  const num=d.reduce((s,x)=>s+x.num,0),den2=d.reduce((s,x)=>s+x.den,0),av=den2>0?num/den2:0;
  const cumple=activeInd.datos.filter(x=>x.estado==='SI CUMPLE').length;
  const nc=activeInd.datos.filter(x=>x.estado==='NO CUMPLE').length;
  const sp=activeInd.datos.filter(x=>x.estado==='SIN PACIENTES').length;
  const mrs=getMRs();
  const mrStats=mrs.map(mr=>({mr,...getMRStats(mr,activeInd)})).filter(s=>s.den>0).sort((a,b)=>b.av-a.av);
  const bars=mrStats.map(s=>{
    const pv=s.av*100,mp=activeInd.meta*100,c=clrAv(s.av,activeInd.meta);
    return `<div class="bar-row" onclick="selectedMR='${s.mr.replace(/'/g,"\\'")}';renderSidebar();renderMain();">
      <div class="bar-label">${s.mr}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.min(pv,100)}%;background:${c};">${pv>18?pct(s.av):''}</div>
        <div class="meta-line" style="left:${mp}%;"></div>
      </div>
      <div class="bar-pct" style="color:${c}">${pct(s.av)}</div>
    </div>`;
  }).join('');

  main.innerHTML=`${tabsHTML()}
    ${cardsHTML(cumple,nc,sp,av,num,den2,activeInd.metaLabel)}
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,.05);">
      <div class="section-title">Avance por Microred <span style="font-size:10px;opacity:.6">▏= línea de meta · click = ver detalle</span></div>
      <div class="bar-chart">${bars}</div>
    </div>`;
}

// ── DETALLE MICRORED ──
function renderMicroredDetail(main,mr){
  const s=getMRStats(mr,activeInd);
  const ipress=activeInd.datos.filter(d=>d.mr===mr);
  const tieneDetalle=(activeInd.detalle||[]).length>0;

  const rows=ipress.map(d=>{
    const bw=d.den>0?Math.min(d.av/activeInd.meta,1)*100:0;
    const c=d.estado==='SI CUMPLE'?'var(--green)':d.estado==='NO CUMPLE'?'var(--red)':'var(--text3)';
    const bc=d.estado==='SI CUMPLE'?'badge-cumple':d.estado==='NO CUMPLE'?'badge-nocumple':'badge-sinpac';
    const icon=d.estado==='SI CUMPLE'?'✓':d.estado==='SIN PACIENTES'?'—':'✗';

    // numerador y denominador clicables si hay detalle
    let numCell, denCell;
    if(tieneDetalle && d.den>0){
      numCell=`<span class="num-link green-link" title="Ver pacientes que CUMPLEN" onclick="openModal('${d.est.replace(/'/g,"\\'")}','cumple')">${d.num}</span>`;
      denCell=`<span class="num-link red-link" title="Ver pacientes que NO CUMPLEN" onclick="openModal('${d.est.replace(/'/g,"\\'")}','nocumple')">${d.den}</span>`;
    } else {
      numCell=`<span class="num-link gray-link">${d.num}</span>`;
      denCell=`<span class="num-link gray-link">${d.den}</span>`;
    }

    return `<tr>
      <td>${d.est}</td>
      <td>${d.cod}</td>
      <td>${numCell}</td>
      <td>${denCell}</td>
      <td><div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${bw}%;background:${c};"></div></div>
        <span class="progress-pct" style="color:${c}">${d.den>0?pct(d.av):'—'}</span>
      </div></td>
      <td><span class="badge ${bc}">${icon} ${d.estado}</span></td>
    </tr>`;
  }).join('');

  const hint = tieneDetalle
    ? `<span style="font-size:11px;color:var(--green);font-family:var(--mono);margin-left:8px;">💡 Haz clic en el número verde (num) o rojo (den) para ver el detalle de pacientes</span>`
    : `<span style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:8px;">Sin detalle de pacientes cargado</span>`;

  main.innerHTML=`${tabsHTML()}
    <button class="back-btn" onclick="selectedMR=null;renderSidebar();renderMain();">← Volver al resumen</button>
    <div class="view-title">${mr}</div>
    <div class="view-sub">${activeInd.titulo} · ${activeInd.metaLabel}</div>
    ${cardsHTML(s.cumple,s.noCumple,s.sinPac,s.av,s.num,s.den,activeInd.metaLabel)}
    <div class="section-title">IPRESS de la Microred ${hint}</div>
    <div style="overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.05);">
      <table>
        <thead><tr>
          <th>Establecimiento</th><th>Código</th>
          <th title="Clic para ver pacientes que cumplen">Numerador ↑</th>
          <th title="Clic para ver pacientes que no cumplen">Denominador ↑</th>
          <th style="min-width:160px">Avance</th><th>Estado</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderMain(){
  const m=document.getElementById('main');
  selectedMR?renderMicroredDetail(m,selectedMR):renderOverview(m);
}

// ── MODAL PACIENTES ──
function openModal(establecimiento, filtro){
  const detalle = activeInd.detalle || [];
  // Filtrar por establecimiento
  modalPacientes = detalle.filter(p => {
    const est = (p['ESTABLECIMIENTO'] || p['Establecimiento'] || '').trim();
    return est === establecimiento;
  });

  modalFilter = filtro;
  document.getElementById('modalTitle').textContent = `Pacientes — ${establecimiento}`;
  document.getElementById('modalSub').textContent = `${activeInd.titulo} · ${activeInd.metaLabel}`;
  document.getElementById('modalSearch').value = '';
  document.getElementById('modalOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';

  updateFilterBtns();
  renderModalTable();
}

function setFilter(f){
  modalFilter = f;
  updateFilterBtns();
  renderModalTable();
}

function updateFilterBtns(){
  document.getElementById('btnAll').className = 'filter-btn' + (modalFilter==='all'?' active-all':'');
  document.getElementById('btnCumple').className = 'filter-btn' + (modalFilter==='cumple'?' active-cumple':'');
  document.getElementById('btnNoCumple').className = 'filter-btn' + (modalFilter==='nocumple'?' active-nocumple':'');
}

function renderModalTable(){
  const search = document.getElementById('modalSearch').value.toLowerCase();

  let filtered = modalPacientes.filter(p => {
    const estado = (p['ESTADO'] || '').toUpperCase();
    if(modalFilter==='cumple' && !estado.includes('SI CUMPLE') && !estado.includes('SÍ')) return false;
    if(modalFilter==='nocumple' && !estado.includes('NO CUMPLE')) return false;
    if(search){
      const nombre = (p['NOMBRE PACIENTE'] || '').toLowerCase();
      const dni = String(p['DNI PACIENTE'] || '');
      if(!nombre.includes(search) && !dni.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('modalCount').textContent = `${filtered.length} pacientes`;

  if(!filtered.length){
    document.getElementById('modalHead').innerHTML='';
    document.getElementById('modalBody').innerHTML=`<tr><td colspan="10" class="modal-empty">No hay pacientes para mostrar</td></tr>`;
    return;
  }

  // Detectar columnas disponibles (excluir internas)
  const skip = ['_sheet'];
  const allKeys = [...new Set(filtered.flatMap(p => Object.keys(p)))].filter(k => !skip.includes(k));

  // Columnas prioritarias primero
  const priority = ['N°','DNI PACIENTE','NOMBRE PACIENTE','FECHA ATENCION','FECHA DE ATENCION',
    'CODIGO CIE-10','TIPO DIAGNOSTICO','TIPO DE DIAGNOSTICO','ESTADO','MOTIVO / RECOMENDACION'];
  const ordered = [...priority.filter(k=>allKeys.includes(k)),
    ...allKeys.filter(k=>!priority.includes(k) && !['CODIGO IPRESS','ESTABLECIMIENTO','MICRORED','PERIODO','N°'].includes(k))];

  document.getElementById('modalHead').innerHTML =
    `<tr>${ordered.map(k=>`<th>${k}</th>`).join('')}</tr>`;

  document.getElementById('modalBody').innerHTML = filtered.map(p => {
    return `<tr>${ordered.map(k => {
      const val = p[k] || '—';
      if(k==='ESTADO'){
        const isCumple = String(val).toUpperCase().includes('SI') || String(val).toUpperCase().includes('SÍ');
        const bc = isCumple ? 'badge-cumple' : 'badge-nocumple';
        const icon = isCumple ? '✓' : '✗';
        return `<td><span class="badge ${bc}">${icon} ${val}</span></td>`;
      }
      if(k==='MOTIVO / RECOMENDACION') return `<td class="motivo-cell">${val}</td>`;
      return `<td>${val}</td>`;
    }).join('')}</tr>`;
  }).join('');
}

function closeModal(){
  document.getElementById('modalOverlay').style.display='none';
  document.body.style.overflow='';
}

function closeModalOutside(e){
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

init();
</script>
</body>
</html>
